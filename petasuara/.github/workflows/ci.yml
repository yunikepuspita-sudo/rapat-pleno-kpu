# CI (Arsitektur 7.3): uji unit pipeline + (kelak) uji regresi korpus emas kecil —
# hasil model tidak boleh bergeser tanpa kenaikan versi run.
name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q
